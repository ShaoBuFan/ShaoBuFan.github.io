<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>存在计时器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F5F0E8;
    --bg-card: #EDE8DE;
    --border: #D8D0C0;
    --text-main: #2C2417;
    --text-sub: #7A6E5F;
    --text-dim: #A89E8E;
    --accent: #8B6F47;
    --accent2: #C4956A;
    --bar-bg: #DDD6C8;
    --bar-fill1: #8B6F47;
    --bar-fill2: #C4956A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(196,149,106,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(139,111,71,0.06) 0%, transparent 60%);
    color: var(--text-main);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 24px;
  }

  .container { width: 100%; max-width: 580px; }

  .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px; }
  .main-time { font-family: 'Lora', Georgia, serif; font-size: clamp(26px, 5vw, 36px); line-height: 1.45; margin-bottom: 32px; white-space: pre; animation: breathe 5s ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { opacity: 0.88; } 50% { opacity: 1; } }

  .progress-wrap { margin-bottom: 36px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .progress-track { height: 3px; background: var(--bar-bg); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--bar-fill1), var(--bar-fill2)); border-radius: 99px; transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1); }

  .divider { height: 1px; background: var(--border); margin-bottom: 40px; opacity: 0.6; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .card-value { font-family: 'Lora', serif; font-size: 15px; color: var(--text-main); line-height: 1.6; }
  .card-sub { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

  .footer { margin-top: 10px; font-size: 11px; color: var(--text-dim); text-align: right; }

  /* 评论区微调，确保与原生样式和谐共存 */
  .comments-section { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 40px; }
  .comments-header-title { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px; display: block; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .card { display: flex; align-items: baseline; justify-content: space-between; }
    .card-label { margin-bottom: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="eyebrow">You have existed for</div>
  <div class="main-time" id="mainTime">—</div>

  <div class="progress-wrap">
    <div class="progress-label"><span>生命进度</span><span id="progressPct">—</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">预期进度</div>
      <div id="pctMean" class="card-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">预期剩余</div>
      <div id="remainMean" class="card-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">估计心跳</div>
      <div id="heartbeat" class="card-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">地球公转</div>
      <div id="earth" class="card-value">—</div>
    </div>
  </div>

  <div class="footer">μ = 80 yr · σ = 10 yr · n = 2000</div>

  <div class="comments-section">
    <span class="comments-header-title">痕迹 / Comments</span>
    <div id="tcomment"></div>
  </div>
</div>

<script>
// ── 核心逻辑（保持不变） ──
const BIRTH = new Date("2001-12-04T23:00:00+08:00");
const HEART_RATE = 70; const MU = 80; const SIGMA = 10; const N = 2000;

function exactDiff(now) {
  let t = new Date(BIRTH); let y = 0, mo = 0;
  for (;;) { const nx = new Date(t); nx.setFullYear(nx.getFullYear() + 1); if (nx <= now) { t = nx; y++; } else break; }
  for (;;) { const nx = new Date(t); nx.setMonth(nx.getMonth() + 1); if (nx <= now) { t = nx; mo++; } else break; }
  let rem = now - t;
  const d = Math.floor(rem / 86400000); rem %= 86400000;
  const h = Math.floor(rem / 3600000); rem %= 3600000;
  const min = Math.floor(rem / 60000); const s = Math.floor((rem % 60000) / 1000);
  return { y, mo, d, h, min, s };
}

function randNorm(mu, sigma) {
  const u1 = Math.random(), u2 = Math.random();
  return mu + sigma * Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
}

function lifeModel(now) {
  const age = (now - BIRTH) / (1000 * 60 * 60 * 24 * 365.2422);
  const pcts = [], rems = [];
  for (let i = 0; i < N; i++) {
    const L = randNorm(MU, SIGMA); if (L <= age) continue;
    pcts.push(age / L); rems.push((L - age) * 365.2422);
  }
  pcts.sort((a, b) => a - b); rems.sort((a, b) => a - b);
  const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
  return { pctMean: avg(pcts), remMean: avg(rems), age };
}

function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function update() {
  const now = new Date();
  const diff = exactDiff(now);
  const mdl = lifeModel(now);
  document.getElementById('mainTime').textContent = `${diff.y} 年  ${diff.mo} 月  ${diff.d} 天\n${diff.h} 时  ${diff.min} 分  ${diff.s} 秒`;
  const pct = (mdl.pctMean * 100).toFixed(4);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pctMean').textContent = pct + '%';
  document.getElementById('remainMean').textContent = fmt(Math.round(mdl.remMean)) + ' 天';
  const totalMin = (now - BIRTH) / 60000;
  document.getElementById('heartbeat').textContent = fmt(Math.floor(totalMin * HEART_RATE)) + ' 次';
  document.getElementById('earth').textContent = mdl.age.toFixed(6) + ' 圈';
}

setInterval(update, 1000);
update();
</script>

<script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.39/dist/twikoo.all.min.js"></script>
<script>
  twikoo.init({
    envId: 'https://lifetime-commemorate.netlify.app/.netlify/functions/twikoo',
    el: '#tcomment',
    lang: 'zh-CN'
  })
</script>
</body>
</html>
